<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pan Muffin</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="manifest" href="manifest.json">

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('¡Aplicación lista para instalar con éxito!'))
          .catch(err => console.log('Error al configurar la instalación', err));
      }
    </script>

    <style>
        input[type="number"] { -webkit-appearance: none; -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    </style>
</head>
<body class="bg-stone-50/60 min-h-screen text-stone-800 antialiased">
    
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white p-6 rounded-3xl border border-stone-200/80 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-amber-900/10 text-amber-900 p-3 rounded-2xl text-2xl">🥐</div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-stone-900">Control de Pan Muffin</h1>
                    <p class="text-xs text-stone-500 font-medium">Gestión de inventarios, descongelados y ventas diarias</p>
                </div>
            </div>
            <button onclick="guardarRegistro()" class="w-full md:w-auto bg-amber-900 hover:bg-amber-950 text-white px-6 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
                <i class="fas fa-save"></i> Guardar Registro Diario
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-3xl border border-stone-200/80 shadow-sm p-6 md:p-8">
                    <div class="flex items-center justify-between border-b border-stone-100 pb-4 mb-6">
                        <div class="flex items-center gap-2.5">
                            <span class="text-lg text-amber-800"><i class="fas fa-calculator"></i></span>
                            <h2 class="text-lg font-bold text-stone-900">Calculadora Diaria</h2>
                        </div>
                        <div class="flex items-center gap-2 bg-stone-50 border border-stone-200 px-3 py-1.5 rounded-xl">
                            <i class="far fa-calendar text-stone-400 text-xs"></i>
                            <input type="date" id="fecha" class="bg-transparent font-semibold text-xs text-stone-700 focus:outline-none">
                        </div>
                    </div>
                    <div id="tabla-calculadora" class="space-y-8"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-3xl border border-stone-200/80 shadow-sm p-6">
                    <div class="flex items-center justify-between border-b border-stone-100 pb-4 mb-4 gap-2">
                        <div class="flex items-center gap-2.5">
                            <span class="text-base text-stone-500"><i class="fas fa-history"></i></span>
                            <h2 class="text-lg font-bold text-stone-900">Historial</h2>
                        </div>
                        <button onclick="exportarAPDF()" class="bg-stone-900 hover:bg-stone-800 text-white text-[10px] font-bold px-3 py-2 rounded-xl flex items-center gap-1 shadow-md">
                            <i class="fas fa-file-pdf text-red-400"></i> Exportar PDF
                        </button>
                    </div>
                    <div id="historial-lista" class="space-y-4 max-h-[65vh] overflow-y-auto pr-1"></div>
                </div>

                <div id="resumen-guardado" class="hidden bg-emerald-50 border border-emerald-200 rounded-3xl p-5">
                    <h3 class="font-bold text-emerald-900 flex items-center gap-2 mb-3 text-sm">
                        <i class="fas fa-check-circle text-emerald-600"></i> ¡Registro Guardado Exitosamente!
                    </h3>
                    <div id="contenido-resumen" class="space-y-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let productos = [
            { id: "muffin", nombre: "PAN MUFFIN", porEmpaque: 84, meta: 350, inicial: 30, vendido: 0, sacadoManana: 0, etiquetaEmpaque: "Bolsa 84 uds", empaqueNombre: "jabas", textoAbajo: "Pan muffin para mañana" },
            { id: "tortilla", nombre: "TORTILLA 8", porEmpaque: 12, meta: 52, inicial: 5, vendido: 0, sacadoManana: 0, etiquetaEmpaque: "Bolsa 12 uds", empaqueNombre: "bolsas", textoAbajo: "Tortilla de 8 para mañana" }
        ];

        function calcularPaquetes(cantidad, porEmpaque, empaqueNombre) {
            const paquetes = Math.floor(cantidad / porEmpaque);
            const sobrante = Math.max(0, cantidad % porEmpaque);
            if (paquetes === 0) return `${sobrante} ${empaqueNombre === 'bolsas' ? 'uds' : 'panes'}`;
            return `${paquetes} ${empaqueNombre} y ${sobrante} ${empaqueNombre === 'bolsas' ? 'uds' : 'panes'}`;
        }

        function abrirConvertidorBolsas(index) {
            const prod = productos[index];
            const respuesta = prompt(`¿Cuántas BOLSAS completas tienes de ${prod.nombre}? \n(Trae 12 unidades cada una)`);
            if (respuesta) {
                const bolsas = parseInt(respuesta);
                if (!isNaN(bolsas) && bolsas >= 0) {
                    const totalUnidades = bolsas * 12;
                    document.getElementById(`input-inicial-${index}`).value = totalUnidades;
                    actualizarValores(index, 'inicial', totalUnidades);
                }
            }
        }

        function generarCampos() {
            const container = document.getElementById('tabla-calculadora');
            container.innerHTML = '';
            productos.forEach((prod, index) => {
                const sacarHoy = Math.max(0, prod.meta - prod.inicial);
                const paquetesHoy = calcularPaquetes(sacarHoy, prod.porEmpaque, prod.empaqueNombre);
                const vendidoAuto = sacarHoy;
                prod.vendido = vendidoAuto; 

                let valorParaManana = Math.max(0, prod.sacadoManana - prod.inicial);
                const paquetesManana = calcularPaquetes(valorParaManana, prod.porEmpaque, prod.empaqueNombre);

                container.innerHTML += `
                    <div class="bg-stone-50/50 border border-stone-200/70 rounded-2xl p-5 shadow-sm">
                        <div class="flex items-center justify-between border-b border-stone-200/60 pb-3 mb-5">
                            <span class="font-extrabold text-base text-stone-900">${prod.nombre}</span>
                            <span class="text-[10px] bg-stone-200 text-stone-600 font-bold px-2.5 py-1 rounded-md uppercase">${prod.etiquetaEmpaque}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-white p-3 rounded-xl border border-stone-200">
                                <label class="block text-[10px] font-bold text-stone-400 uppercase text-center mb-1">Meta</label>
                                <input type="number" value="${prod.meta}" oninput="actualizarValores(${index}, 'meta', this.value)" class="w-full text-center text-lg font-bold text-stone-800 focus:outline-none">
                            </div>
                            <div class="bg-white p-3 rounded-xl border border-stone-200 flex flex-col justify-between">
                                <label class="block text-[10px] font-bold text-stone-400 uppercase text-center mb-1">Inicial</label>
                                <input type="number" id="input-inicial-${index}" value="${prod.inicial}" oninput="actualizarValores(${index}, 'inicial', this.value)" class="w-full text-center text-lg font-bold text-stone-800 focus:outline-none">
                                <button onclick="abrirConvertidorBolsas(${index})" class="text-[8px] text-amber-800 font-bold mt-1 block text-center border-t pt-1">Convertir Bolsas</button>
                            </div>
                            <div class="bg-white p-3 rounded-xl border border-stone-200">
                                <label class="block text-[10px] font-bold text-amber-800 uppercase text-center mb-1">Para Mañana</label>
                                <input type="number" value="${prod.sacadoManana}" oninput="actualizarValores(${index}, 'sacadoManana', this.value)" class="w-full text-center text-lg font-bold text-amber-900 focus:outline-none">
                            </div>
                        </div>
                        <div class="mt-4 grid grid-cols-2 gap-4">
                            <div class="bg-amber-800/[0.03] border border-amber-800/10 rounded-xl p-3 text-center">
                                <div class="text-amber-800/80 font-bold text-[10px] uppercase">Sacado Hoy</div>
                                <div id="sacarHoy-val-${prod.id}" class="text-xl font-black text-amber-950">${sacarHoy}</div>
                                <div id="paquetes-val-${prod.id}" class="text-[10px] text-stone-500">${paquetesHoy}</div>
                            </div>
                            <div class="bg-stone-100/50 border border-stone-200 rounded-xl p-3 text-center flex flex-col justify-center">
                                <div class="text-stone-500 font-bold text-[10px] uppercase">Vendido</div>
                                <div id="vendido-val-${prod.id}" class="text-xl font-black text-stone-800">${vendidoAuto}</div>
                            </div>
                        </div>
                        <div class="mt-4 bg-orange-600/[0.03] border border-orange-600/15 rounded-xl p-3 text-center">
                            <div class="text-orange-800 font-bold text-[10px] uppercase">${prod.textoAbajo}</div>
                            <div id="total-manana-num-${prod.id}" class="text-xl font-black text-orange-950">${valorParaManana}</div>
                            <div id="paquetes-manana-val-${prod.id}" class="text-[10px] font-semibold text-orange-700/80">${paquetesManana}</div>
                        </div>
                    </div>
                `;
            });
        }

        function actualizarValores(index, campo, valor) {
            const prod = productos[index];
            prod[campo] = parseInt(valor) || 0;

            const sacarHoy = Math.max(0, prod.meta - prod.inicial);
            const paquetesHoy = calcularPaquetes(sacarHoy, prod.porEmpaque, prod.empaqueNombre);
            prod.vendido = sacarHoy; 

            let totalConResta = Math.max(0, prod.sacadoManana - prod.inicial);

            document.getElementById(`sacarHoy-val-${prod.id}`).innerText = sacarHoy;
            document.getElementById(`paquetes-val-${prod.id}`).innerText = paquetesHoy;
            document.getElementById(`vendido-val-${prod.id}`).innerText = prod.vendido;
            document.getElementById(`total-manana-num-${prod.id}`).innerText = totalConResta;
            document.getElementById(`paquetes-manana-val-${prod.id}`).innerText = calcularPaquetes(totalConResta, prod.porEmpaque, prod.empaqueNombre);
        }

        function guardarRegistro() {
            const fechaInput = document.getElementById('fecha').value;
            if (!fechaInput) return alert("Ingresa una fecha");

            const fechaObj = new Date(fechaInput + "T12:00:00");
            const fecha = `${String(fechaObj.getDate()).padStart(2,'0')}/${String(fechaObj.getMonth()+1).padStart(2,'0')}/${fechaObj.getFullYear()}`;

            let resumenHTML = `<p class="font-bold text-stone-700 text-xs mb-2">Resumen del ${fecha}</p>`;
            let historial = JSON.parse(localStorage.getItem('panHistorial')) || [];

            productos.forEach(prod => {
                let totalConResta = Math.max(0, prod.sacadoManana - prod.inicial);
                let totalMañanaSumado = totalConResta + prod.inicial; 

                historial.push({
                    fecha, producto: prod.nombre, meta: prod.meta, vendido: prod.vendido,
                    sacadoManana: totalConResta, finalHoy: prod.inicial, totalManana: totalMañanaSumado,
                    paquetesMananaTexto: calcularPaquetes(totalConResta, prod.porEmpaque, prod.empaqueNombre)
                });

                resumenHTML += `
                    <div class="bg-white p-2.5 rounded-xl border border-stone-200 mb-1.5 text-[9px]">
                        <div class="font-bold text-stone-800 mb-1">${prod.nombre}</div>
                        <div class="grid grid-cols-5 gap-1 text-center font-bold">
                            <div class="bg-stone-50 p-1 rounded">Sacao<br>${prod.meta}</div>
                            <div class="bg-stone-50 p-1 rounded">Vend.<br>${prod.vendido}</div>
                            <div class="bg-emerald-50 p-1 rounded text-emerald-800">Sob.<br>${prod.inicial}</div>
                            <div class="bg-orange-50 p-1 rounded text-orange-800">Para M.<br>${totalConResta}</div>
                            <div class="bg-blue-50 p-1 rounded text-blue-800">Total M.<br>${totalMañanaSumado}</div>
                        </div>
                    </div>`;
            });

            localStorage.setItem('panHistorial', JSON.stringify(historial));
            document.getElementById('contenido-resumen').innerHTML = resumenHTML;
            document.getElementById('resumen-guardado').classList.remove('hidden');
            alert("✅ Guardado en el historial");
            cargarHistorial();
        }

        function cargarHistorial() {
            const historial = JSON.parse(localStorage.getItem('panHistorial')) || [];
            const container = document.getElementById('historial-lista');
            container.innerHTML = '';

            if (historial.length === 0) {
                container.innerHTML = `<p class="text-xs text-stone-400 text-center py-4">No hay registros</p>`;
                return;
            }

            historial.sort((a,b) => b.fecha.localeCompare(a.fecha)).forEach((r, i) => {
                container.innerHTML += `
                    <div class="bg-stone-50/50 border border-stone-200 rounded-xl p-3 text-[10px]">
                        <div class="flex justify-between items-center mb-2 font-bold">
                            <span>${r.fecha} - <span class="text-amber-900">${r.producto}</span></span>
                            <button onclick="eliminarRegistro(${i})" class="text-stone-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="grid grid-cols-5 gap-1 text-center font-semibold text-[8px]">
                            <div class="bg-white border p-1 rounded">Sacado<br><b>${r.meta}</b></div>
                            <div class="bg-white border p-1 rounded">Vendido<br><b>${r.vendido}</b></div>
                            <div class="bg-emerald-50 text-emerald-900 p-1 rounded">Sobrante<br><b>${r.finalHoy}</b></div>
                            <div class="bg-orange-50 text-orange-900 p-1 rounded">Para M.<br><b>${r.sacadoManana}</b></div>
                            <div class="bg-blue-50 text-blue-900 p-1 rounded">Total M.<br><b>${r.totalManana}</b></div>
                        </div>
                    </div>
                `;
            });
        }

        function eliminarRegistro(i) {
            if (confirm("¿Borrar este registro?")) {
                let h = JSON.parse(localStorage.getItem('panHistorial')) || [];
                h.splice(i,1);
                localStorage.setItem('panHistorial', JSON.stringify(h));
                cargarHistorial();
            }
        }

        function exportarAPDF() {
            const historial = JSON.parse(localStorage.getItem('panHistorial')) || [];
            if (historial.length === 0) return alert("No hay datos históricos.");

            const fechaActual = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            let filasHTML = '';
            historial.sort((a,b) => b.fecha.localeCompare(a.fecha)).forEach((r, idx) => {
                const bg = idx % 2 === 0 ? '#ffffff' : '#f8fafc';
                filasHTML += `
                    <tr style="background-color: ${bg}; text-align: center; font-size: 11px;">
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; font-weight: bold;">${r.fecha}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; font-weight: bold; color: #78350f;">${r.producto}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0;">${r.meta}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0;">${r.vendido}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #15803d; font-weight: bold; background-color: #f0fdf4;">${r.finalHoy}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #c2410c; font-weight: bold; background-color: #fff7ed;">${r.sacadoManana} <small style="display:block; font-size:8px; color:#b45309; font-weight:400;">(${r.paquetesMananaTexto})</small></td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #1e3a8a; font-weight: 800; background-color: #eff6ff;">${r.totalManana}</td>
                    </tr>`;
            });

            const ventanaReporte = window.open('', '_blank');
            ventanaReporte.document.write(`
                <html>
                <head>
                    <title>Reporte_Muffin_Inventario</title>
                    <style>
                        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; color: #1e293b; background: #fff; }
                        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                        th { background-color: #78350f; color: white; padding: 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
                        @media print { @page { size: A4 landscape; margin: 10mm; } }
                    </style>
                </head>
                <body>
                    <div style="border-bottom: 2px solid #78350f; padding-bottom: 10px; margin-bottom: 20px;">
                        <h2 style="margin: 0; color: #0f172a; font-size: 22px;">Control de Inventario y Production</h2>
                        <p style="margin: 3px 0 0 0; font-size: 11px; color: #64748b;">Reporte Histórico de Panificación • Generado el ${fechaActual}</p>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left;">Fecha</th>
                                <th style="text-align:left;">Producto</th>
                                <th>Sacado Hoy</th>
                                <th>Vendido</th>
                                <th>Sobrante</th>
                                <th>Para Mañana</th>
                                <th>Total Mañana</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filasHTML}
                        </tbody>
                    </table>
                    <script>
                        setTimeout(function(){
                            window.print();
                        }, 300);
                    <\/script>
                </body>
                </html>
            `);
            ventanaReporte.document.close();
        }

        window.onload = () => {
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            generarCampos();
            cargarHistorial();
        };
    </script>
</body>
</html>
